<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forma</title>
  <link rel="stylesheet" href="popup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="logo-row">
        <img id="popup-logo" src="../../assets/logo-light.png" alt="Forma" class="logo-icon" />
        <div>
          <h1 class="app-name">Forma</h1>
          <p class="tagline">Smart placement form filler</p>
        </div>
      </div>
    </div>

    <!-- Profile Status -->
    <div id="profile-status" class="profile-status">
      <span id="profile-indicator" class="indicator"></span>
      <span id="profile-text">Checking profile...</span>
    </div>

    <!-- Main Actions -->
    <div class="actions-section">
      <button id="btn-autofill" class="btn btn-primary" disabled>
        <svg class="btn-icon" viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
          <path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"/>
        </svg>
        Autofill This Form
      </button>
    </div>

    <!-- Results Area -->
    <div id="results-area" class="results-area hidden">
      <div class="results-header">Results</div>
      <div class="results-stats">
        <div class="stat stat-filled">
          <span id="filled-count" class="stat-number">0</span>
          <span class="stat-label">filled</span>
        </div>
        <div class="stat stat-skipped">
          <span id="skipped-count" class="stat-number">0</span>
          <span class="stat-label">skipped</span>
        </div>
      </div>
      <button id="btn-clear" class="btn btn-secondary">
        Clear Highlights
      </button>
    </div>

    <!-- Not on Form Warning -->
    <div id="not-on-form" class="info-message hidden">
      <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
      </svg>
      <span>Open a Google Form to use Forma.</span>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Settings -->
    <div class="settings-section">
      <div class="setting-row">
        <div class="setting-label">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
            <path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z"/>
          </svg>
          <span>Autofill on page load</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-autofill" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="setting-row" style="margin-top: 10px;">
        <div class="setting-label">
          <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
          </svg>
          <span>Dark mode</span>
        </div>
        <label class="toggle">
          <input type="checkbox" id="toggle-theme" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Footer -->
    <div class="popup-footer">
      <a id="btn-options" href="#" class="footer-link">
        <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
        Edit Profile
      </a>
    </div>
  </div>

  <script src="../../dist/popup.js"></script>
</body>
</html>
